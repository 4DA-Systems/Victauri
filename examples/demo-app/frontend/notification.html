<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f13;
      color: #e0e0e0;
      padding: 20px;
    }
    h1 { color: #8b5cf6; font-size: 1.3em; margin-bottom: 16px; }
    .notif {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .notif:hover { border-color: #8b5cf6; }
    .notif.read { opacity: 0.6; }
    .notif h3 { font-size: 0.95em; color: #a78bfa; margin-bottom: 4px; }
    .notif p { font-size: 0.85em; color: #aaa; }
    .empty { color: #666; text-align: center; padding: 40px; font-size: 0.9em; }
  </style>
</head>
<body>
  <h1>Notifications</h1>
  <div id="notif-list"></div>

  <script>
    const { invoke } = window.__TAURI__.core;
    const { listen } = window.__TAURI__.event;

    async function render() {
      const notifs = await invoke("list_notifications");
      const list = document.getElementById("notif-list");

      if (notifs.length === 0) {
        list.innerHTML = '<div class="empty">No notifications</div>';
        return;
      }

      list.innerHTML = notifs.map(n => `
        <div class="notif ${n.read ? 'read' : ''}" data-id="${n.id}" data-testid="notif-item-${n.id}">
          <h3>${n.title}</h3>
          <p>${n.body}</p>
        </div>
      `).join("");

      list.querySelectorAll(".notif:not(.read)").forEach(el => {
        el.addEventListener("click", async () => {
          await invoke("mark_notification_read", { id: parseInt(el.dataset.id, 10) });
          render();
        });
      });
    }

    render();
    listen("notification-added", () => render());
  </script>
</body>
</html>
